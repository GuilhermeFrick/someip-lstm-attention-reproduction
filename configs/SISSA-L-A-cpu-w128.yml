Model:
  type: SISSA_LSTM
  name: SISSA-L-A-cpu-w128

Params:
  hidden_size: 256
  attention: true
  n_pack: 128
  pack_dim: 25
  n_classes: 7

Train:
  weights_dir: results/weights
  train_log_dir: results/train_log
  device: cpu
  batch_size: 128
  epochs: 100
  lr: 0.0001
  weight_decay: 0.0001
  n_workers: 0
  pin_memory: false
  train_dir: data/train
  val_dir: data/val

Test:
  test_dir: data/val
  weights_path: results/weights/SISSA-L-A-cpu-w128/best.pt
  out_dir: results/test_result
  device: cpu
  batch_size: 1
  n_workers: 0
  pin_memory: false
  weight_path: results/weights/SISSA-L-A-cpu-w128/best.pt
